server {
    listen 80;
    listen [::]:80;
    server_name api.annur.com.kg;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.annur.com.kg;

    ssl_certificate /config/etc/letsencrypt/live/api.annur.com.kg/fullchain.pem;
    ssl_certificate_key /config/etc/letsencrypt/live/api.annur.com.kg/privkey.pem;

    location / {
        proxy_pass http://web:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }
}